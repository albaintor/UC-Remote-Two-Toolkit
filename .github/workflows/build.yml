name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

env:
  HASH_FILENAME_WINDOWS: ucrtool-windows.hash
  HASH_FILENAME_MAC: ucrtool-macos.hash
  HASH_FILENAME_LINUX_AMD64: ucrtool-linux-amd64.hash
  HASH_FILENAME_LINUX_ARM64: ucrtool-linux-arm64.hash

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    strategy:
      matrix:
        node-version:
          - '22.x'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 200

      - name: Fetch all tags to determine version
        shell: pwsh
        run: |
          chcp 65001
          git fetch origin +refs/tags/*:refs/tags/*
          echo "VERSION=v$(jq .version -r package.json)" >> $env:GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build Angular
        run: npm run-script build

      - name: Build node JS
        shell: pwsh
        run: |
          cd server
          npm ci
          echo "Building NodeJS app to bundle compatible with CommonJS format for executable injection"
          npx esbuild --format=cjs --target=node22 --platform=node --bundle --outfile=bundle.js dist/app.js
          echo "Creating blob for injection"
          node --experimental-sea-config sea-config.json
          node -e "require('fs').copyFileSync(process.execPath, 'ucrtool-server.exe')"
          echo "Injecting blob in NodeJS executable"
          npx postject ucrtool-server.exe NODE_SEA_BLOB sea-prep.blob --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cp server/ucrtool-server.exe artifacts/
          cp -r server/public artifacts/
          echo "ARTIFACT_NAME=ucrtool-${{ env.VERSION }}-windows" >> "$GITHUB_ENV"

      - name: Create upload artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ github.workspace }}/artifacts/*" -DestinationPath "${{ env.ARTIFACT_NAME }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.zip
          if-no-files-found: error
          retention-days: 3

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        node-version:
          - '22.x'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 200

      - name: Fetch all tags to determine version
        shell: bash
        run: |
          git fetch origin +refs/tags/*:refs/tags/*
          echo "VERSION=v$(jq .version -r package.json)" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build Angular
        run: npm run-script build

      - name: Build node JS
        shell: bash
        run: |
          cd server
          npm ci
          echo "Building NodeJS app to bundle compatible with CommonJS format for executable injection"
          npx esbuild --format=cjs --target=node22 --platform=node --bundle --outfile=bundle.js dist/app.js
          echo "Creating blob for injection"
          node --experimental-sea-config sea-config.json
          cp "$(command -v node)" ucrtool-server
          codesign --remove-signature ucrtool-server || true
          echo "Injecting blob in NodeJS executable"
          npx postject ucrtool-server NODE_SEA_BLOB sea-prep.blob --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 --macho-segment-name NODE_SEA
          codesign --sign - ucrtool-server

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cp server/ucrtool-server artifacts/
          cp -r server/public artifacts/
          echo "ARTIFACT_NAME=ucrtool-${{ env.VERSION }}-macos" >> "$GITHUB_ENV"

      - name: Create upload artifact
        shell: bash
        run: |
          tar czvf "${{ env.ARTIFACT_NAME }}.tar.gz" -C "${GITHUB_WORKSPACE}/artifacts" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz
          if-no-files-found: error
          retention-days: 3

  build-ubuntu:
    name: Build Ubuntu (${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    environment: Ubuntu
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            node-version: '22.x'
            arch: amd64
            docker-platform: linux/amd64
          - runs-on: ubuntu-latest
            node-version: '22.x'
            arch: arm64
            docker-platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 200

      - name: Fetch all tags to determine version
        shell: bash
        run: |
          git fetch origin +refs/tags/*:refs/tags/*
          echo "VERSION=v$(jq .version -r package.json)" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build Angular
        run: npm run-script build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push Docker to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.docker-platform }}
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: ${{ env.DOCKERHUB_USERNAME }}/uc-tool:${{ matrix.arch }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-manifest:
    name: Publish Docker multi-arch latest
    runs-on: ubuntu-latest
    needs:
      - build-ubuntu
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Set up Docker Buildx
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch latest manifest
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        run: |
          docker buildx imagetools create \
            --tag ${DOCKERHUB_USERNAME}/uc-tool:latest \
            ${DOCKERHUB_USERNAME}/uc-tool:amd64-latest \
            ${DOCKERHUB_USERNAME}/uc-tool:arm64-latest

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
      - build-ubuntu
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.zip
            **/*.tar.gz
