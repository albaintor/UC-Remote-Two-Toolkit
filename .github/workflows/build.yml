name: Build

on:
push:
branches: [ main ]
tags: [ 'v*' ]
pull_request:

jobs:

build-ubuntu:
name: Build Ubuntu (${{ matrix.arch }})
runs-on: ubuntu-latest

```
env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

strategy:
  matrix:
    include:
      - arch: amd64
        docker-platform: linux/amd64
      - arch: arm64
        docker-platform: linux/arm64

steps:
  - name: Checkout
    uses: actions/checkout@v4

  # Setup Node AVANT tout build
  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 22
      cache: 'npm'

  - name: Install dependencies
    run: npm ci

  - name: Build Angular
    run: npm run build

  # Docker buildx pour multi-arch
  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  # Login uniquement si secrets présents
  - name: Login to Docker Hub
    if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
    uses: docker/login-action@v3
    with:
      username: ${{ env.DOCKERHUB_USERNAME }}
      password: ${{ env.DOCKERHUB_TOKEN }}

  - name: Build and push Docker
    uses: docker/build-push-action@v6
    with:
      context: .
      platforms: ${{ matrix.docker-platform }}
      push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
      tags: ${{ env.DOCKERHUB_USERNAME }}/uc-tool:${{ matrix.arch }}-latest
      cache-from: type=gha
      cache-to: type=gha,mode=max
```

docker-manifest:
name: Publish Docker multi-arch latest
runs-on: ubuntu-latest
needs: build-ubuntu

```
env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

steps:
  - name: Set up Docker Buildx
    if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
    uses: docker/setup-buildx-action@v3

  - name: Login to Docker Hub
    if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
    uses: docker/login-action@v3
    with:
      username: ${{ env.DOCKERHUB_USERNAME }}
      password: ${{ env.DOCKERHUB_TOKEN }}

  - name: Create and push multi-arch manifest
    if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
    run: |
      docker buildx imagetools create \
        --tag ${DOCKERHUB_USERNAME}/uc-tool:latest \
        ${DOCKERHUB_USERNAME}/uc-tool:amd64-latest \
        ${DOCKERHUB_USERNAME}/uc-tool:arm64-latest
```

release:
name: Create Release
runs-on: ubuntu-latest
needs: build-ubuntu
if: startsWith(github.ref, 'refs/tags/')

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Create GitHub Release
    uses: softprops/action-gh-release@v2
```
